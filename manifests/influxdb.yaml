apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: pi-services
  labels:
    app: influxdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      hostNetwork: true
      containers:
      - name: influxdb
        image: influxdb:1.8
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8086
          hostPort: 8086
        env:
        - name: INFLUXDB_DB
          value: "network_latency"
        volumeMounts:
        - name: data
          mountPath: /var/lib/influxdb
        resources:
          requests:
            cpu: 100m
            memory: 384Mi
          limits:
            cpu: "1"
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /ping
            port: 8086
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ping
            port: 8086
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: data
        hostPath:
          path: /kubernetes-volumes/influxdb
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: pi-services
spec:
  type: ClusterIP
  ports:
  - port: 8086
    targetPort: 8086
  selector:
    app: influxdb
